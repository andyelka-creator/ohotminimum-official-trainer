name: CI Integrity

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify integrity
        run: npm run verify:integrity
