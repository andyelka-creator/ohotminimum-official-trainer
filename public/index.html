<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Охотничий минимум — официальный тренажер</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Охотничий минимум</h1>
        <p>Официальный тренажер</p>
      </header>
      <section id="status" class="status">Loading...</section>

      <nav id="tabs" class="tabs hidden" aria-label="Разделы">
        <button id="tabTrainer" class="tab active" type="button">Тренажер</button>
        <button id="tabMatrix" class="tab" type="button">Матрица правил</button>
      </nav>

      <section id="trainer" class="trainer hidden">
        <div id="questionText" class="question"></div>
        <ol id="answers" class="answers"></ol>
        <div class="toolbar">
          <button id="prevBtn" type="button">Назад</button>
          <button id="nextBtn" type="button">Далее</button>
        </div>
      </section>

      <section id="matrix" class="matrix hidden">
        <h2>Матрица правил</h2>
        <p class="matrix-subtitle">Сгруппировано по повторяющимся нормам. Нажмите на номер вопроса для перехода.</p>
        <div id="matrixGrid" class="matrix-grid"></div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
